name: Release Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test:run

  release-please:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - id: release
        uses: google-github-actions/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node
          target-branch: main

  build-mobile:
    needs: release-please
    if: >-
      needs.release-please.outputs.release_created
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build mobile app
        working-directory: apps/mobile
        run: pnpm prebuild --platform android

      - name: Build Android Bundle
        working-directory: apps/mobile
        run: |
          pnpm expo export --platform android
          mkdir -p dist
          cp -r .expo/dist dist/android

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-bundle
          path: apps/mobile/.expo/dist
          retention-days: 30

  build-web:
    needs: release-please
    if: >-
      needs.release-please.outputs.release_created
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm build

      - name: Upload web artifacts
        uses: actions/upload-artifact@v7
        with:
          name: web-build
          path: .next
          retention-days: 30